<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Focal Support</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f8f8;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      max-width: 420px;
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 2rem;
    }

    p {
      color: #555;
      line-height: 1.5;
    }

    a {
      color: #4649FF;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Focal Support</h1>
    <p>For questions, bug reports, or feedback, contact:</p>
    <p><a href="mailto:flayr.data@gmail.com">flayr.data@gmail.com</a></p>
  </div>
</body>
</html>
